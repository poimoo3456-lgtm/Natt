<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevNatt Contact</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card{
  background:white;
  padding:25px;
  border-radius:20px;
  width:340px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,.3);
}

h2{
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

button{
  width:100%;
  padding:14px;
  background:#16a34a;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  background:#15803d;
}

.success{
  display:none;
  background:#dcfce7;
  color:#166534;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  font-weight:bold;
}

.contact{
  margin-top:20px;
}

.contact a{
  display:block;
  margin:8px 0;
  padding:12px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
  color:white;
}

.fb{
  background:#1877f2;
}

.msg{
  background:#0084ff;
}

.call{
  background:#0ea5e9;
}
</style>
</head>

<body>

<div class="card">

<div class="success" id="successMsg">
ส่งข้อมูลสำเร็จ ✅
</div>

<h2>ติดต่อ DevNatt</h2>

<form id="myForm">
<input type="text" id="name" placeholder="ชื่อ" required>
<input type="text" id="detail" placeholder="รายละเอียด" required>
<button type="submit">ส่งข้อมูล</button>
</form>

<div class="contact">
<hr>

<a class="fb" href="https://www.facebook.com/share/1DUgDCm87d/" target="_blank">
📘 เข้า Facebook
</a>

<a class="msg" href="https://m.me/" target="_blank">
💬 แชท Messenger
</a>

<a class="call" href="tel:0637695934">
📞 โทร 0637695934
</a>

</div>

</div>

<script>
document.getElementById("myForm").addEventListener("submit", function(e){
e.preventDefault();

fetch("https://script.google.com/macros/s/AKfycbwWdaPoVjZXtYhV5tDQ3DnxJOfh5z7JyxyahKMPXiSl7V2RRk3c6bmXhS1xIwouhf3W/exec", {
method: "POST",
mode: "no-cors",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
name: document.getElementById("name").value,
detail: document.getElementById("detail").value
})
})
.then(() => {
document.getElementById("successMsg").style.display = "block";
document.getElementById("myForm").reset();
})
.catch(() => {
alert("เกิดข้อผิดพลาด ❌");
});
});
</script>

</body>
</html>
